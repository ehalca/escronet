version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: escronet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: escronet
      POSTGRES_PASSWORD: escronet
      POSTGRES_DB: escronet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
