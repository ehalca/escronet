buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 34
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.24"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.2")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Force a pinned ONNX Runtime version across ALL subprojects to avoid the
// 'latest.integration' dynamic version that triggers a SAX XML parsing bug.
subprojects {
    configurations.all {
        resolutionStrategy {
            force "com.microsoft.onnxruntime:onnxruntime-android:1.20.0"
            force "com.microsoft.onnxruntime:onnxruntime-android-qnn:1.20.0"
        }
    }
}
