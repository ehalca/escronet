<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0D1B2A"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1E3A5F" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>
  <!-- Glow blob -->
  <ellipse cx="600" cy="315" rx="380" ry="240" fill="#4FC3F7" opacity="0.04"/>
  <!-- Shield icon centered -->
  <g transform="translate(510, 100)">
    <path d="M90 20 L160 48 L160 100 C160 147 126 174 90 190 C54 174 20 147 20 100 L20 48 Z"
          fill="#1E3A5F" stroke="#4FC3F7" stroke-width="5" stroke-linejoin="round"/>
    <rect x="62" y="95" width="10" height="30" rx="5" fill="#4FC3F7"/>
    <rect x="76" y="85" width="10" height="50" rx="5" fill="#4FC3F7"/>
    <rect x="90" y="72" width="10" height="76" rx="5" fill="#4FC3F7"/>
    <rect x="104" y="85" width="10" height="50" rx="5" fill="#4FC3F7"/>
    <rect x="118" y="95" width="10" height="30" rx="5" fill="#4FC3F7"/>
  </g>
  <!-- Wordmark -->
  <text x="600" y="355" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle" letter-spacing="-1">Escronet</text>
  <!-- Tagline -->
  <text x="600" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#4FC3F7" text-anchor="middle" opacity="0.9">On-device scam call prevention</text>
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#1E3A5F" opacity="0.6"/>
  <text x="600" y="616" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#607D8B" text-anchor="middle">Privacy first · Open source · Free</text>
</svg>
