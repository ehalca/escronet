# Run once to obtain the initial TLS certificate.
# After the cert is issued, use prod-docker-compose.yml for all subsequent starts.

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d/app-certonly.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    command: >
      certonly --webroot
      -w /var/www/certbot
      -d escronet.com
      --email admin@escronet.com
      --agree-tos
      --no-eff-email
